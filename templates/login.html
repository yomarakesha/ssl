<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSL Manager — Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        .login-logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 25px rgba(0, 180, 216, 0.35);
        }

        .login-logo i {
            font-size: 2rem;
            color: white;
        }

        .login-title {
            color: #ffffff;
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.25rem;
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .form-label {
            color: rgba(255, 255, 255, 0.75);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #ffffff;
            padding: 0.65rem 1rem;
            transition: all 0.2s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #00b4d8;
            color: #ffffff;
            box-shadow: 0 0 0 3px rgba(0, 180, 216, 0.2);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-right: none;
            border-radius: 10px 0 0 10px;
            color: rgba(255, 255, 255, 0.5);
        }

        .input-group .form-control {
            border-left: none;
            border-radius: 0 10px 10px 0;
        }

        .btn-login {
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            padding: 0.7rem;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 180, 216, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 180, 216, 0.45);
            color: white;
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .alert {
            border-radius: 10px;
            font-size: 0.875rem;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h1 class="login-title">SSL Manager</h1>
        <p class="login-subtitle">Система управления сертификатами</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2">
            <i class="bi bi-exclamation-circle me-1"></i>{{ message }}
        </div>
        {% endfor %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Имя пользователя</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" name="username" placeholder="Введите имя пользователя"
                        required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Пароль</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="Введите пароль" required>
                </div>
            </div>
            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right me-2"></i>Войти
            </button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

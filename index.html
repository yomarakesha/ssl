<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSL Менеджер — Вход</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100">
    <div class="login-card card shadow-lg border-0">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <div class="login-icon mb-3">
            <i class="bi bi-shield-lock-fill"></i>
          </div>
          <h2 class="fw-bold text-white mb-1">SSL Менеджер</h2>
          <p class="text-muted-light">Управление сертификатами и серверами</p>
        </div>

        <div id="loginError" class="alert alert-danger d-none" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>Неверное имя пользователя или пароль.
        </div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="username" class="form-label text-white-soft">Имя пользователя</label>
            <div class="input-group">
              <span class="input-group-text login-input-icon"><i class="bi bi-person-fill"></i></span>
              <input type="text" class="form-control login-input" id="username" placeholder="Введите имя пользователя" required autocomplete="username">
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label text-white-soft">Пароль</label>
            <div class="input-group">
              <span class="input-group-text login-input-icon"><i class="bi bi-lock-fill"></i></span>
              <input type="password" class="form-control login-input" id="password" placeholder="Введите пароль" required autocomplete="current-password">
              <button class="btn login-input-icon border-0" type="button" id="togglePassword" tabindex="-1">
                <i class="bi bi-eye-fill" id="toggleIcon"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-login w-100 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-2"></i>Войти
          </button>
        </form>

        <div class="text-center mt-4">
          <small class="text-muted-light">Демо: <code class="text-info">admin</code> / <code class="text-info">admin</code></small>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function () {
      const pw = document.getElementById('password');
      const icon = document.getElementById('toggleIcon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.className = 'bi bi-eye-slash-fill';
      } else {
        pw.type = 'password';
        icon.className = 'bi bi-eye-fill';
      }
    });

    // Redirect if already logged in
    if (localStorage.getItem('ssl_auth')) {
      window.location.href = 'app.html';
    }

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');

      // Simple credential check (hardcoded for demo)
      if (user === 'admin' && pass === 'admin') {
        localStorage.setItem('ssl_auth', JSON.stringify({ username: user }));
        window.location.href = 'app.html';
      } else {
        errorEl.classList.remove('d-none');
        document.getElementById('password').value = '';
      }
    });
  </script>
</body>
</html>
